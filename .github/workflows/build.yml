name: Android CI (Cetak APK Otomatis)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Assemble Debug APK)
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TeleDrive-BukanKantor
        path: app/build/outputs/apk/
      - name: Kirim APK ke Telegram
        run: |
          APK_PATH=$(find app/build/outputs/apk/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "*.apk" | head -n 1)
          fi
          curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F document=@"$APK_PATH" \
               -F caption="🚀 **TeleDrive Matang!** Silakan unduh APK hasil perbaikan terbaru ini, Bos." \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
               
